# Configuration des ponderations du scoring
# Override possible par type de dossier (VN vs VO)
# Les poids doivent totaliser 100

default:
  vin_consistency: 30.0
  identity_consistency: 20.0
  document_validity: 20.0
  vehicle_coherence: 15.0
  address_validity: 10.0
  driving_license: 5.0

# VN : pas de chaine de propriete, VIN plus important
vn_override:
  vin_consistency: 35.0
  identity_consistency: 20.0
  document_validity: 20.0
  vehicle_coherence: 15.0
  address_validity: 5.0
  driving_license: 5.0

# VO : chaine de propriete critique, adresse moins importante
vo_override:
  vin_consistency: 25.0
  identity_consistency: 20.0
  document_validity: 25.0
  vehicle_coherence: 15.0
  address_validity: 10.0
  driving_license: 5.0

# Seuils de decision
thresholds:
  accept: 95.0
  correction: 60.0
