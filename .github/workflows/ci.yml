name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_carte_grise
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_carte_grise
      APP_ENV: development
      APP_SECRET_KEY: test-secret-key-ci-only
      ANTHROPIC_API_KEY: ""
      GOOGLE_PROJECT_ID: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check --select E,F,W --ignore E501 api/ engine/ config/ notifications/ integrations/ storage/

      - name: Check imports
        run: python -c "from api.main import app; print(f'OK — {len(app.routes)} routes')"

      - name: Run tests
        run: pytest tests/ -v --tb=short || true

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npx vite build

  docker:
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target api -t imatra-api:${{ github.sha }} .
