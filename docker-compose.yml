# Imatra — Logiciel local pour agents habilités SIV
#
# Lance le logiciel sur la machine de l'agent. Tout est local :
#   - SQLite pour la base de données
#   - PaddleOCR pour la lecture des documents
#   - Stockage chiffré Fernet pour les fichiers
#   - Aucune connexion cloud (sauf vérification optionnelle de licence
#     et téléchargement des règles V-XX/C-XX à jour)
#
# Démarrage :
#     docker compose up -d
#     → ouvrir http://localhost:8001 dans le navigateur
#
# Arrêt :
#     docker compose down
#
# Mise à jour :
#     docker compose pull && docker compose up -d
#
# Sauvegarde des données :
#     Le dossier ./data contient toutes les données locales (BDD SQLite,
#     documents chiffrés, licence). Sauvegardez-le régulièrement.

services:
  imatra:
    build:
      context: .
      dockerfile: Dockerfile
    image: imatra:local-2.0
    container_name: imatra

    # Port exposé sur l'hôte (modifiable si conflit avec un autre service)
    ports:
      - "8001:8001"

    # Volume persistant pour toutes les données locales
    # ./data contient :
    #   - imatra.db        (SQLite)
    #   - documents/            (documents chiffrés Fernet)
    #   - .license/             (license.key + trial_started.json)
    #   - .encryption_key       (clé Fernet du store)
    #   - rules/current.json    (bundle de règles signé)
    #   - logs/
    volumes:
      - ./data:/app/data

    # Variables d'environnement (toutes optionnelles, valeurs par défaut OK)
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8001
      DATABASE_URL: sqlite+aiosqlite:////app/data/imatra.db
      STORAGE_PATH: /app/data/documents
      OCR_PROVIDER: paddle
      OCR_LANGUAGE: fr
      LOG_LEVEL: INFO

    # Redémarrage automatique sauf arrêt explicite
    restart: unless-stopped

    # Ressources : PaddleOCR aime avoir au moins 2 Go de RAM
    # (commenté par défaut, à décommenter si nécessaire selon la machine)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    #     reservations:
    #       memory: 2G

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
